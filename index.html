<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    * {
        font-size: 150%;
        margin-top: 15px;
        margin-left: 15px;
    }
</style>
<body>
<div id="zapros">
  <button onclick="push2()">Сзделать запрос</button>
</div>
<div id="main">
  <button onclick="push()">Нажми на меня!</button>
</div>
</body>
</html>

<script>
    let counter = 0;
    function push() {
        counter++;

        let main = document.getElementById('main');
        if (counter===1) {
            let list = document.createElement('ul');
            list.id = 'my-list';
            document.body.appendChild(list);
        }

        let myList = document.getElementById('my-list');
        let myText = document.createElement('li');
        myText.innerText = 'vladik';
        if (counter === 5) {
            myText.innerText = 'vladik bro';
        }
        myList.appendChild(myText);
    }

    async function push2() {
        try {
            const response = await fetch('https://jsonplaceholder.typicode.com/todos?_limit=5')

            if (!response.ok) {
                throw new Error('Error');
            }

            const tasks = await response.json();

            for (let i = 0; i < tasks.length; i++) {
              let elem = document.createElement('li');
              elem.innerText = tasks[i].title;
              myList.appendChild(elem);
            }

        } catch (error) {
            console.log(error)
        }
    }
</script>
